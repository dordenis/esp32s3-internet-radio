; PlatformIO Project Configuration File
;
;   Build options: build flags, source filter
;   Upload options: custom upload port, speed and extra flags
;   Library options: dependencies, extra library storages
;   Advanced options: extra scripting
;
; Please visit documentation for the other options and examples
; https://docs.platformio.org/page/projectconf.html


[env:waveshare_esp32_s3_zero]
platform = espressif32@6.5.0
board = esp32-s3-devkitc-1
framework = arduino
monitor_speed = 115200

# Настройки памяти для чипа FH4R2
board_build.arduino.memory_type = qio_qspi 
board_build.flash_mode = qio
board_upload.flash_size = 4MB

# Выбираем таблицу разделов, которая влезет в 4МБ (стандартная)
board_build.partitions = default.csv

build_flags = 
    -D ARDUINO_USB_CDC_ON_BOOT=1
    -D ARDUINO_USB_MODE=1
    -D BOARD_HAS_PSRAM=1


lib_deps = 
    # Работа с графикой и шрифтами [cite: 1]
    adafruit/Adafruit GFX Library @ ^1.11.9
    
    # Драйвер для OLED дисплея SSD1306 [cite: 1]
    adafruit/Adafruit SSD1306 @ ^2.5.9
    
    # Шина I2C (обычно встроена в ядро, но полезна для зависимостей) [cite: 1]
    Wire

    ESP32-audioI2S
    
    # BLE стек (в ESP32-S3 встроен в ядро Arduino, 
    # внешняя библиотека часто не требуется, но можно указать для стабильности) [cite: 1]

    https://github.com/igorantolic/ai-esp32-rotary-encoder.git

    esphome/ESPAsyncWebServer-esphome @ ^3.1.0
    esphome/AsyncTCP-esphome @ ^2.1.1

    bblanchon/ArduinoJson @ ^7.0.0
    




    